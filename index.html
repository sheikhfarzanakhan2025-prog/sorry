<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I am Sorry</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;600&family=Cinzel:wght@700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-glow"></div>

    <div id="intro-screen" onclick="revealMessage()">
        <div class="intro-content">
            <h2 class="sub-title">A Heartfelt Note</h2>
            <h1 class="main-title">SORRY PRIYO</h1>
            <p class="blink-text">এখানে স্পর্শ করুন</p>
        </div>
    </div>

    <div id="main-content">
        <div class="premium-card">
            <div class="message-box">
                <span id="typing-text"></span>
            </div>
            
            <div class="final-note">
                <p>প্লিজ, মাফ করে দাও না?</p>
                <button class="reset-btn" onclick="location.reload()">আবার দেখুন</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
